{{- range $name, $cpConfig := .Values.alerting.contactPoints }}
---
apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaContactPoint
metadata:
  name: {{ printf "%s-%s" (include "grafana-operator-crd.fullname" $) $name }}
  labels:
    {{- include "grafana-operator-crd.labels" $ | nindent 4 }}
spec:
  instanceSelector:
    matchLabels:
      dashboards: {{ $.Values.instance.dashboardLabel | default (include "grafana-operator-crd.fullname" $) | quote }}
  name: {{ $cpConfig.name | default $name }}
  receivers:
    {{- tpl (toYaml $cpConfig.receivers) $ | nindent 4 }}
{{- end }}
