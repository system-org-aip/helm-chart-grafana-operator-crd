{{- range $name, $config := .Values.dashboards }}
---
apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDashboard
metadata:
  name: {{ $name }}
  labels:
    {{- include "grafana-operator-crd.labels" $ | nindent 4 }}
spec:
  # Если папка не указана, дашборд упадет в корень
  {{- if $config.folderRef }}
  folderRef: {{ $config.folderRef | quote }}
  {{- end }}
  
  resyncPeriod: {{ $config.resyncPeriod | default "30s" | quote }}
  
  instanceSelector:
    matchLabels:
      dashboards: {{ $.Values.instance.dashboardLabel | default (include "grafana-operator-crd.fullname" $) | quote }}
  
  # Прокидываем переменные окружения (например, для датасорсов внутри JSON)
  {{- if $config.envs }}
  envs:
    {{- toYaml $config.envs | nindent 4 }}
  {{- end }}

  # Поддержка JSON из разных источников
  {{- if $config.configMapRef }}
  # Читаем JSON из существующего ConfigMap
  jsonFrom:
    name: {{ $config.configMapRef.name | default (printf "dashboard-%s" $name) }}
    key: {{ $config.configMapRef.key | default "dashboard.json" }}
  {{- else if $config.json }}
  json: |
    {{- $config.json | nindent 4 }}
  {{- else if $config.file }}
  json: |
    {{- $.Files.Get $config.file | nindent 4 }}
  {{- else if $config.fileContent }}
  json: |
    {{- $config.fileContent | nindent 4 }}
  {{- else }}
    {{- fail (printf "No data source provided for dashboard %s" $name) }}
  {{- end }}
{{- end }}
