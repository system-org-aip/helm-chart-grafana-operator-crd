{{- range $name, $config := .Values.dashboards }}
---
apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDashboard
metadata:
  name: {{ printf "%s-%s" (include "grafana-resources.fullname" $) $name }}
  labels:
    {{- include "grafana-resources.labels" $ | nindent 4 }}
spec:
  # Если папка не указана, дашборд упадет в корень
  {{- if $config.folderRef }}
  folderRef: {{ $config.folderRef | quote }}
  {{- end }}
  
  resyncPeriod: {{ $config.resyncPeriod | default "30s" | quote }}
  
  instanceSelector:
    matchLabels:
      dashboards: {{ $.Values.instance.dashboardLabel | default (include "grafana-resources.fullname" $) | quote }}
  
  # Прокидываем переменные окружения (например, для датасорсов внутри JSON)
  {{- if $config.envs }}
  envs:
    {{- toYaml $config.envs | nindent 4 }}
  {{- end }}

  # Рендерим JSON: либо переданный строкой, либо прочитанный из файла
  {{- if $config.json }}
  json: |
    {{- $config.json | nindent 4 }}
  {{- else if $config.file }}
  json: |
    {{- $.Files.Get $config.file | nindent 4 }}
  {{- end }}
{{- end }}
